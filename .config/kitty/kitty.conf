# ====================== Основные настройки ======================

# Шрифт (очень важная часть красоты)
font_family      JetBrains Mono Nerd Font
bold_font        JetBrains Mono Nerd Font Bold
italic_font      JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic

font_size 14.0

# Альтернативы (раскомментируй нужное):
# font_family      FiraCode Nerd Font
# font_family      Monaspace Neon
# font_family      Berkeley Mono

# ====================== Внешний вид ======================

# Скрываем title bar полностью
hide_window_decorations yes

# Делаем окно прозрачным и красивым
background_opacity 0.92
dynamic_background_opacity yes

# Отступы внутри окна
window_padding_width 12
window_margin_width 0

# Закруглённые углы (работает с prefer-no-csd в niri)
resize_draw_strategy scale

# ====================== Цветовая схема (Catppuccin Mocha — сейчас один из лучших) ======================

include current-theme.conf

# Если хочешь встроенную тему без отдельного файла:
# foreground #cdd6f4
# background #1e1e2e
# cursor     #f5e0dc

# ====================== Поведение ======================

enable_audio_bell no
visual_bell_duration 0.0

# Прокрутка
scrollback_lines 10000
scrollback_pager_history_size 100000

# Подсказки при нажатии Ctrl+Shift
confirm_os_window_close 0

# ====================== Дополнительно ======================

# Поддержка undercurl и современных фич
undercurl_style thick-sparse

# Kitty не будет показывать заголовок даже если CSD включены
titlebar_only_minimize no
